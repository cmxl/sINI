# Full-line comment at the top
app_name = MyApp
version = 1.0

[Basic]
name = John Doe
email = test@example.com
age = 30

[ Whitespace Section ]
key = value

[Comments]
# Full-line comment inside a section
host = localhost # trailing comment
port = 8080 # trailing comment with spaces

[Quoted Values]
simple = "hello world"
with_hash = "value # not a comment"
with_bracket = "value [not a section]"
escaped_quotes = "she said ""hello"" to me"
empty = ""

[Empty Values]
no_value =
whitespace_only =

[Section With Trailing Comment] # this part is ignored
key = value

[Spacing]
tight=value
loose  =  value
key = value with spaces in it

[Basic]
email = override@example.com
city = New York

[Case Insensitive]
MyKey = original

[case insensitive]
mykey = overwritten
AnotherKey = value

[Last Section No Trailing Newline]
key = value
